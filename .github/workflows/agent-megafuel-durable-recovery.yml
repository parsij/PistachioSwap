              """Repository code and CI do not apply these migrations.

          ## Durable signed intent recovery

          Each Pistachio Wallet signature is stored against its one-time intent before the backend broadcasts it. The fee payment, exact approval, and exact swap raw transactions are kept separately, along with their transaction hashes, broadcast attempts, timestamps, and an append-only `sponsorship_intent_events` history.

          A backend recovery loop checks pending intents every five seconds. If the browser closes after a signed raw transaction reaches the API, the backend can safely reconcile or rebroadcast those exact same bytes. Replaying the exact bytes cannot create a different transaction because the signer, nonce, target, calldata, amount, gas limit, and transaction hash are already fixed.

          The backend still cannot sign a future step on the user's behalf. If the browser closes before Pistachio Wallet signs the approval or swap intent, the user must reconnect and continue from the SQL-backed current step.
          """,
