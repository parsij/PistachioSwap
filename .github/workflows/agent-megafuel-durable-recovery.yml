      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: API typecheck
        run: pnpm --filter @pistachio/api typecheck

      - name: Durable MegaFuel tests
        run: >-
          pnpm --filter @pistachio/api exec vitest run
          test/megafuel-durable-intents.test.ts
          test/prepaid-sponsorship.test.ts
          test/megafuel-exact-payment.test.ts
          test/megafuel-normal-swap.test.ts
          test/megafuel-two-policy.test.ts
          --reporter=verbose

      - name: Commit verified changes
        shell: bash
        run: |
          rm .github/workflows/agent-megafuel-durable-recovery.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Persist and recover signed MegaFuel intents"
          git push origin HEAD:feature/megafuel-exact-prepaid-flow
