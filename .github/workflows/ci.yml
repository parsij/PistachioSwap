name: MegaFuel exact flow

on:
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'tools/apply_gas_assist_routing_fix.py'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/megafuel-exact-prepaid-flow
          fetch-depth: 0

      - name: Apply and capture exact result
        id: apply
        shell: bash
        run: |
          set +e
          python tools/apply_gas_assist_routing_fix.py > routing-fix-apply.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat routing-fix-apply.log
          exit 0

      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: routing-fix-apply-log
          path: routing-fix-apply.log

      - name: Fail when patch application failed
        if: ${{ steps.apply.outputs.status != '0' }}
        run: exit 1
