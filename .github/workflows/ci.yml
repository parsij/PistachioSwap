name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Focused frontend MegaFuel tests
        run: >-
          pnpm exec vitest run
          src/features/gas-assist/services/rawTransactionSigning.test.js
          src/features/gas-assist/hooks/usePrepaidSponsorship.test.jsx
          src/features/gas-assist/components/GasAssistPrepaymentDialog.test.jsx
          --reporter=verbose

      - name: API typecheck
        run: pnpm --filter @pistachio/api typecheck

      - name: Focused API MegaFuel tests
        run: >-
          pnpm --filter @pistachio/api exec vitest run
          test/prepaid-sponsorship.test.ts
          test/megafuel-exact-payment.test.ts
          --reporter=verbose

      - name: Full frontend tests
        id: frontend_tests
        continue-on-error: true
        run: >-
          pnpm exec vitest run
          --reporter=json
          --outputFile=frontend-vitest-results.json

      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-vitest-results
          path: frontend-vitest-results.json
          if-no-files-found: error

      - name: API tests
        run: pnpm --filter @pistachio/api test

      - name: Frontend build
        run: pnpm build

      - name: Report frontend test failures
        if: steps.frontend_tests.outcome == 'failure'
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs'
          const result = JSON.parse(readFileSync('frontend-vitest-results.json', 'utf8'))
          const failed = (result.testResults ?? [])
            .filter((file) => file.status === 'failed' || (file.assertionResults ?? []).some((test) => test.status === 'failed'))
            .map((file) => ({
              file: file.name,
              tests: (file.assertionResults ?? [])
                .filter((test) => test.status === 'failed')
                .map((test) => ({ title: test.fullName, failureMessages: test.failureMessages })),
              message: file.message,
            }))
          console.error(JSON.stringify({ failed }, null, 2))
          process.exit(1)
          NODE
