name: MegaFuel exact flow

on:
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'tools/apply_gas_assist_routing_fix.py'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/megafuel-exact-prepaid-flow
          fetch-depth: 0

      - name: Apply or persist exact failure
        run: |
          set +e
          python tools/apply_gas_assist_routing_fix.py > routing-fix-apply.log 2>&1
          status=$?
          cat routing-fix-apply.log
          if [ "$status" -ne 0 ]; then
            git config user.name 'parsij'
            git config user.email '205437194+parsij@users.noreply.github.com'
            git add routing-fix-apply.log
            git commit -m 'Record Gas Assist routing patch failure'
            git push origin HEAD:feature/megafuel-exact-prepaid-flow
            exit "$status"
          fi
          echo 'Patch application unexpectedly succeeded during diagnostic run.' > routing-fix-apply.log
          git config user.name 'parsij'
          git config user.email '205437194+parsij@users.noreply.github.com'
          git add routing-fix-apply.log
          git commit -m 'Record Gas Assist routing patch result'
          git push origin HEAD:feature/megafuel-exact-prepaid-flow
