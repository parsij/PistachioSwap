name: MegaFuel exact flow

on:
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'tools/apply_gas_assist_routing_fix.py'

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/megafuel-exact-prepaid-flow
          fetch-depth: 0

      - name: Apply Gas Assist routing implementation
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/apply_gas_assist_routing_fix.py')
          source = path.read_text()
          marker = '\nreplace_once(\n    ".github/workflows/ci.yml",'
          if marker not in source:
              raise RuntimeError('CI-tail marker was not found in the staged routing script.')
          implementation = source.split(marker, 1)[0]
          exec(compile(implementation, str(path), 'exec'))
          PY
          rm -f tools/apply_gas_assist_routing_fix.py
          rm -f .github/workflows/apply-gas-assist-routing-fix.yml
          rm -f routing-fix-apply.log

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Frontend Gas Assist routing tests
        run: >-
          pnpm exec vitest run
          src/features/gas-assist/services/rawTransactionSigning.test.js
          src/features/gas-assist/hooks/usePrepaidSponsorship.test.jsx
          src/features/gas-assist/hooks/useGasAssistController.test.jsx
          src/features/gas-assist/components/GasAssistPrepaymentDialog.test.jsx
          src/features/swap/hooks/useSwapQuote.gas-assist.test.jsx
          src/services/swapExecutionMode.test.js
          --reporter=verbose

      - name: API typecheck
        run: pnpm --filter @pistachio/api typecheck

      - name: API MegaFuel tests
        run: >-
          pnpm --filter @pistachio/api exec vitest run
          test/prepaid-sponsorship.test.ts
          test/megafuel-exact-payment.test.ts
          test/megafuel-normal-swap.test.ts
          test/megafuel-two-policy.test.ts
          --reporter=verbose

      - name: Frontend build
        run: pnpm build

      - name: Commit validated implementation
        run: |
          git config user.name 'parsij'
          git config user.email '205437194+parsij@users.noreply.github.com'
          git add -A
          git reset .github/workflows/ci.yml
          git commit -m 'Route low-BNB swaps through prepaid Gas Assist'
          git push origin HEAD:feature/megafuel-exact-prepaid-flow
