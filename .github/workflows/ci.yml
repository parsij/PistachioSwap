name: MegaFuel exact flow

on:
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'apps/api/.env.megafuel.example'
      - 'apps/api/drizzle/0004_megafuel_exact_prepaid_flow.sql'
      - 'apps/api/src/app.ts'
      - 'apps/api/src/gas-assist/**'
      - 'apps/api/src/modules/sponsorship-admin.ts'
      - 'apps/api/test/megafuel-exact-payment.test.ts'
      - 'apps/api/test/prepaid-sponsorship.test.ts'
      - 'src/features/gas-assist/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ci.yml'
      - 'apps/api/.env.megafuel.example'
      - 'apps/api/drizzle/0004_megafuel_exact_prepaid_flow.sql'
      - 'apps/api/src/app.ts'
      - 'apps/api/src/gas-assist/**'
      - 'apps/api/src/modules/sponsorship-admin.ts'
      - 'apps/api/test/megafuel-exact-payment.test.ts'
      - 'apps/api/test/prepaid-sponsorship.test.ts'
      - 'src/features/gas-assist/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export implementation sources
        uses: actions/upload-artifact@v4
        with:
          name: megafuel-source-snapshot
          path: |
            apps/api/src/config.ts
            apps/api/src/db/schema.ts
            apps/api/src/features/quotes/providers/zero-x-provider.ts
            apps/api/src/features/quotes/types/types.ts
            apps/api/src/gas-assist/prepaid/order-service.ts
            apps/api/src/gas-assist/prepaid/intent-service.ts
            apps/api/src/gas-assist/prepaid/chain-client.ts
            apps/api/src/modules/sponsorship.ts
            src/features/gas-assist/hooks/usePrepaidSponsorship.js
            src/features/gas-assist/services/prepaidSponsorship.js
            src/features/gas-assist/components/GasAssistPrepaymentDialog.jsx

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Frontend MegaFuel tests
        run: >-
          pnpm exec vitest run
          src/features/gas-assist/services/rawTransactionSigning.test.js
          src/features/gas-assist/hooks/usePrepaidSponsorship.test.jsx
          src/features/gas-assist/components/GasAssistPrepaymentDialog.test.jsx
          --reporter=verbose

      - name: API typecheck
        run: pnpm --filter @pistachio/api typecheck

      - name: API MegaFuel tests
        run: >-
          pnpm --filter @pistachio/api exec vitest run
          test/prepaid-sponsorship.test.ts
          test/megafuel-exact-payment.test.ts
          --reporter=verbose

      - name: Frontend build
        run: pnpm build
