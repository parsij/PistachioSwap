name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Focused frontend MegaFuel tests
        run: >-
          pnpm exec vitest run
          src/features/gas-assist/services/rawTransactionSigning.test.js
          src/features/gas-assist/hooks/usePrepaidSponsorship.test.jsx
          src/features/gas-assist/components/GasAssistPrepaymentDialog.test.jsx
          --reporter=verbose

      - name: API typecheck
        run: pnpm --filter @pistachio/api typecheck

      - name: Focused API MegaFuel tests
        run: >-
          pnpm --filter @pistachio/api exec vitest run
          test/prepaid-sponsorship.test.ts
          test/megafuel-exact-payment.test.ts
          --reporter=verbose

      - name: Full frontend tests
        id: frontend_tests
        continue-on-error: true
        run: >-
          pnpm exec vitest run
          --reporter=json
          --outputFile=frontend-vitest-results.json

      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-vitest-results
          path: frontend-vitest-results.json
          if-no-files-found: error

      - name: Full API tests
        id: api_tests
        continue-on-error: true
        run: >-
          pnpm --filter @pistachio/api exec vitest run
          --reporter=json
          --outputFile=api-vitest-results.json

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-vitest-results
          path: apps/api/api-vitest-results.json
          if-no-files-found: error

      - name: Frontend build
        run: pnpm build

      - name: Report test failures
        if: steps.frontend_tests.outcome == 'failure' || steps.api_tests.outcome == 'failure'
        run: |
          node --input-type=module <<'NODE'
          import { existsSync, readFileSync } from 'node:fs'
          const files = ['frontend-vitest-results.json', 'apps/api/api-vitest-results.json']
          const failures = []
          for (const path of files) {
            if (!existsSync(path)) continue
            const result = JSON.parse(readFileSync(path, 'utf8'))
            for (const file of result.testResults ?? []) {
              const tests = (file.assertionResults ?? [])
                .filter((test) => test.status === 'failed')
                .map((test) => ({ title: test.fullName, failureMessages: test.failureMessages }))
              if (file.status === 'failed' || tests.length) failures.push({ report: path, file: file.name, tests, message: file.message })
            }
          }
          console.error(JSON.stringify({ failures }, null, 2))
          process.exit(1)
          NODE
