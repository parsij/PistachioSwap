name: Apply pre-signed package

on:
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - '.github/apply-presigned-package.py'
      - '.github/fix-presigned-validation.py'

permissions:
  contents: read

jobs:
  apply:
    if: github.head_ref == 'feature/megafuel-exact-prepaid-flow'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/megafuel-exact-prepaid-flow
          fetch-depth: 0
      - name: Apply patches
        run: |
          python .github/apply-presigned-package.py
          python .github/fix-presigned-validation.py
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate patched tree
        id: validate
        continue-on-error: true
        run: |
          set -o pipefail
          {
            echo '=== API typecheck ==='
            pnpm --filter @pistachio/api typecheck
            echo '=== API focused tests ==='
            pnpm --filter @pistachio/api exec vitest run \
              test/megafuel-presigned-package.test.ts \
              test/token-evidence-exact-transfer.test.ts \
              test/megafuel-durable-intents.test.ts \
              test/megafuel-exact-payment.test.ts \
              test/megafuel-normal-swap.test.ts \
              --reporter=verbose
            echo '=== Frontend focused tests ==='
            pnpm exec vitest run \
              src/features/gas-assist/services/rawTransactionSigning.package.test.js \
              src/features/gas-assist/services/rawTransactionSigning.test.js \
              src/features/gas-assist/hooks/usePrepaidSponsorship.test.jsx \
              src/features/gas-assist/components/GasAssistPrepaymentDialog.test.jsx \
              --reporter=verbose
            echo '=== Frontend build ==='
            pnpm build
          } 2>&1 | tee presigned-package-validation.log
      - name: Upload validation log
        if: steps.validate.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: presigned-package-validation-log
          path: presigned-package-validation.log
          retention-days: 3
          if-no-files-found: error
      - name: Fail validation
        if: steps.validate.outcome == 'failure'
        run: exit 1
      - name: Package validated tree
        run: |
          git diff --name-status HEAD > presigned-final-name-status.txt
          python <<'PY'
          from pathlib import Path
          import subprocess
          import tarfile

          paths = subprocess.check_output([
              'git', 'diff', '--name-only', '--diff-filter=ACMRTUXB', 'HEAD',
          ], text=True).splitlines()
          with tarfile.open('presigned-final-files.tar.gz', 'w:gz') as archive:
              for value in paths:
                  path = Path(value)
                  if path.is_file():
                      archive.add(path, arcname=value)
          PY
      - name: Upload validated tree
        uses: actions/upload-artifact@v4
        with:
          name: presigned-package-validated-tree
          path: |
            presigned-final-name-status.txt
            presigned-final-files.tar.gz
            presigned-package-validation.log
          retention-days: 3
          if-no-files-found: error
