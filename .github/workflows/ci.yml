name: MegaFuel exact flow

on:
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'tools/apply_sponsored_uniswap_fallback.py'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/megafuel-exact-prepaid-flow
          fetch-depth: 0
          show-progress: false

      - name: Apply and persist exact failure
        run: |
          set +e
          python tools/apply_sponsored_uniswap_fallback.py > sponsored-fallback-apply.log 2>&1
          status=$?
          cat sponsored-fallback-apply.log
          if [ "$status" -ne 0 ]; then
            git config user.name 'parsij'
            git config user.email '205437194+parsij@users.noreply.github.com'
            git add -f sponsored-fallback-apply.log
            git reset .github/workflows/ci.yml
            git reset .github/workflows/apply-sponsored-uniswap-fallback.yml || true
            git reset .github/workflows/apply-prepaid-value-fix.yml || true
            git commit -m 'Record sponsored fallback patch failure'
            git push origin HEAD:feature/megafuel-exact-prepaid-flow
            exit "$status"
          fi
          exit 1
