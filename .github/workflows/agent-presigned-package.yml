name: Apply pre-signed package integration

on:
  push:
    branches:
      - feature/megafuel-exact-prepaid-flow
    paths:
      - '.github/workflows/agent-presigned-package.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
