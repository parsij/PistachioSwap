MEGAFUEL_ACTION_INTENT_TTL_SECONDS=90""", """# The reviewed order, all three signing intents, and the post-payment grant
# use a fifteen-minute lifetime.
MEGAFUEL_ORDER_TTL_SECONDS=900
MEGAFUEL_ACTION_INTENT_TTL_SECONDS=900""")
